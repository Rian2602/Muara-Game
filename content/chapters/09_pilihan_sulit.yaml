          menyerap tinta. Perubahan yang tidak terlihat dari luar, tapi terasa
          di dalam.

          Jaya bilang dia akan membantu. Tapi bantuan selalu punya harga.
          Dan harga itu — seperti angka yang tidak pernah salah — akan
          terungkap suatu hari nanti.
