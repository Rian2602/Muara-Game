  - id: "scene_2"
    text: |
      Jaya mendekatiku. Tangannya gemetar — lebih gemetar dari biasanya.
      Matanya merah — bukan karena menangis, tapi karena kurang tidur.

      "Aku menemukan sesuatu," bisiknya. "Di gudang, di belakang kaleng
      yang paling jauh. Ada kertas. Banyak kertas. Semuanya bertulisan
      tangan yang sama."

      Dia menelan ludah. "Tapi ada masalah. Orang itu juga menemukan
      apa yang aku temukan."

