id: "10_konfrontasi"
title: "THE MANDOR'S SHADOW"
location: "Kantor Mandor, Pergudangan Pelabuhan Sunda Kelapa, Batavia"
date: "15 Maret 1899"
time: "16.00"

scenes:
  - id: "scene_1"
    text: |
      Pintu kantor mandor terbuka. Bukan karena aku mengetuk — tapi
      karena Mandor Hanafiah membukanya sendiri. Matanya tajam — seperti
      pisau yang sudah terlalu sering diasah.

      "Masuk," katanya. Suaranya rendah, datar. Seperti orang yang sudah
      lama menunggu sesuatu.

      Aku berdiri di ambang pintu. Lututku kaku. Tapi aku masuk. Karena
      sekarang, aku tahu lebih banyak dari yang seharusnya aku tahu.

  - id: "scene_2"
    text: |
      Kantor mandor kecil — meja kayu, kursi besi, buku besar di atas
      meja. Dinding-dindingnya polos — cat yang mengelupas di sudutnya.
      Tapi ada sesuatu yang berubah: di atas meja, di samping buku besar,
      ada tumpukan kertas. Kertas yang sama seperti yang Jaya temukan.

      Mandor duduk. Matanya tidak bergerak dari wajahku.

      "Kamu tahu," katanya. Bukan pertanyaan. Pernyataan.

      Aku tidak menjawab. Tapi aku tidak perlu menjawab. Matanya sudah
      memberitahuku bahwa dia tahu bahwa aku tahu.

    text_variants:
      - condition: "bukti_tersembunyi == true"
        text: |
          Kantor mandor kecil — meja kayu, kursi besi, buku besar di atas
          meja. Dinding-dindingnya polos — cat yang mengelupas di sudutnya.
          Tapi ada sesuatu yang berubah: di atas meja, di samping buku besar,
          ada tumpukan kertas. Kertas yang sama seperti yang aku sembunyikan.

          Mandor duduk. Matanya tidak bergerak dari wajahku.

          "Kamu tahu," katanya. Bukan pertanyaan. Pernyataan.

          Aku tidak menjawab. Tapi aku tidak perlu menjawab. Matanya sudah
          memberitahuku bahwa dia tahu bahwa aku tahu. Dan dia tahu bahwa
          aku punya bukti.
      - condition: "bukti_tersembunyi == false"
        text: |
          Kantor mandor kecil — meja kayu, kursi besi, buku besar di atas
          meja. Dinding-dindingnya polos — cat yang mengelupas di sudutnya.
          Tapi ada sesuatu yang berubah: di atas meja, di samping buku besar,
