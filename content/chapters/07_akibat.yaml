  - id: "scene_5"
    text: |
      Malam hari. Aku duduk di depan rumah petakku. Lampu minyak menyala
      di samping. Tapi malam ini, aku tidak membuka buku kecil. Aku
      hanya duduk, menatap kegelapan.

      Aku punya dua pilihan. Pertama: terus mencatat seperti biasa,
      berharap orang itu tidak akan melakukan apa-apa. Kedua: sembunyikan
      segalanya — buku, catatan, ingatan — dan berpura-pura tidak
      terjadi apa-apa.

      Tapi ada pilihan ketiga yang tidak pernah aku pertimbangkan sebelumnya:
      cari tahu lebih banyak. Siapa orang itu? Apa yang dia masukkan ke
      dalam kaleng? Dan mengapa mandor tidak melakukan apa-apa?

    text_variants:
      - condition: "respon_ancaman == hadapi"
        text: |
