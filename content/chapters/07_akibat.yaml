    choice:
      prompt: "Apa yang kamu lakukan?"
      options:
        - id: "terus_catat"
          label: "Terus mencatat — ini hakku"
          next: "scene_6"
          hooks:
            - "increment(tekanan_meningkat, 2)"
        - id: "cari_tahu"
          label: "Cari tahu lebih banyak — siapa orang itu?"
          next: "scene_6"
          hooks:
            - "increment(tekanan_meningkat, 3)"
        - id: "sembunyi"
          label: "Sembunyikan segalanya — jangan ambil risiko"
          next: "scene_6"
          hooks:
            - "increment(tekanan_meningkat, 1)"

  - id: "scene_6"
    text: |
      Aku memutuskan sesuatu malam ini. Keputusan yang kecil — mungkin
      terlalu kecil untuk disebut keputusan. Tapi keputusan kecil bisa
      menjadi awal dari sesuatu yang lebih besar.

      Besok, aku akan bangun seperti biasa. Menghitung kaleng seperti
      biasa. Menulis angka seperti biasa. Tapi sekarang, aku akan
      menulis dengan mata yang lebih terbuka.

      Karena sekarang aku tahu: aku tidak sendirian.

    text_variants:
      - condition: "tekanan_meningkat >= 3"
        text: |
          Aku memutuskan sesuatu malam ini. Keputusan yang kecil — mungkin
          terlalu kecil untuk disebut keputusan. Tapi keputusan kecil bisa
          menjadi awal dari sesuatu yang lebih besar.

          Tapi malam ini, keputusan itu terasa lebih berat dari biasanya.
          Tekanan sudah mulai terasa — di dadaku, di kepalaku, di setiap
          langkahku. Seperti angka yang terus bertambah tanpa henti.

          Besok, aku akan bangun seperti biasa. Menghitung kaleng seperti
          biasa. Menulis angka seperti biasa. Tapi sekarang, aku akan
          menulis dengan mata yang lebih terbuka. Dan dengan tangan yang
          lebih gemetar.

          Karena sekarang aku tahu: aku tidak sendirian. Dan tekanan ini
          — seperti angka yang tidak pernah salah — tidak akan berhenti.
        default: true

