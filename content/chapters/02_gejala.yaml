          Dia berdiri dan pergi. Aku mendengar langkahnya — ringan, cepat, seperti
          orang yang lari dari sesuatu yang belum tentu ada.
        default: true

  - id: "scene_5"
    text: |
      Malam itu, aku duduk di depan rumah petakku. Lampu minyak menyala di
      samping. Buku kecilku terbuka di pangkuan.

      Aku menulis: "5 Maret 1899. Jaya melihat. Aku melihat. Selisih ada."
      Lalu aku berhenti. Jari-jariku di atas kertas.

      Aku punya tiga pilihan. Laporkan ke mandor. Diam. Atau sembunyikan
      bukti ini di tempat yang lebih aman dari buku kecilku.

    choice:
      prompt: "Apa yang kamu lakukan?"
      options:
        - id: "lapor"
          label: "Laporkan ke mandor — biar dia yang putuskan"
          next: "scene_6a"
          set_flags:
            - "melapor: true"
            - "trust_level: 5"
        - id: "diam"
          label: "Diam — tutup buku, jangan bicara"
          next: "scene_6b"
          set_flags:
            - "melapor: false"
            - "trust_level: 3"
        - id: "sembunyikan"
          label: "Sembunyikan bukti ini — bukan di buku kecil"
          next: "scene_6c"
          set_flags:
            - "sembunyikan_bukti: true"
            - "trust_level: 4"

  - id: "scene_6a"
    text: |
      Aku berdiri. Lututku kaku. Aku berjalan ke kantor mandor, mengetuk
      pintu dua kali. Mandor Hanafiah membuka. Matanya meneliti wajahku seperti
      meneliti angka di buku besar.

      "Aku perlu bicara," kataku.

      Dia membuka pintu lebih lebar.

    next_chapter: "03a_mandor"

  - id: "scene_6b"
    text: |
      Aku menutup buku kecil. Pelan. Seperti menutup mulut seseorang yang
      hampir berteriak.

      Angka-angka itu masih di kepalaku. Tiga puluh dua. Tiga puluh tiga.
      Tiga puluh empat. Tapi angka di kepalaku tidak bernilai tanpa kertas
      untuk membuktikannya.

      Malam ini, aku tidur dengan buku kecil di bawah bantal. Besok, aku akan
      menghitung lagi. Seperti biasa. Seperti tidak terjadi apa-apa.

    next_chapter: "03b_ungkap"

  - id: "scene_6c"
    text: |
      Aku tidak membawa buku kecil ke gudang besok. Aku menyimpannya di
      tempat lain — di balik batu bata yang longgar di dinding rumah petakku.
      Tempat yang hanya aku yang tahu.

      Di gudang, aku menghitung kaleng tanpa buku kecil. Tangan kosong.
      Jari-jariku bergerak di udara, mengetuk-ngetuk paha kiri. Tapi tidak
      ada kertas. Tidak ada bukti. Hanya angka di kepalaku.

      Aku merasa telanjang.

    next_chapter: "03c_sembunyi"
