id: "02_gejala"
title: "THE WEIGHT OF INK"
location: "Pergudangan Pelabuhan Sunda Kelapa, Batavia"
date: "5 Maret 1899"
time: "06.15"

scenes:
  - id: "scene_1"
    text: |
      Dua hari berlalu. Kaleng timah yang dulu ada di baris ketiga sekarang
      diganti dengan kaleng baru — lebih bersih, lebih mengkilap. Labelnya
      berbeda. Aku menghitung ulang: tiga puluh empat kaleng masuk. Mandor
      menulis tiga puluh tiga.

      Selisihnya berpindah. Dulu satu kaleng hilang. Sekarang satu kaleng
      muncul — tapi bukan kaleng yang sama. Bukan kaleng yang aku lihat
      laki-laki asing itu sentuh.

    text_variants:
      - condition: "melihat_anomali == true"
        text: |
          Dua hari berlalu. Kaleng timah yang dulu ada di baris ketiga sekarang
