          Buku kecilku mencatat angka seperti biasa. Tiga puluh empat. Tiga
          puluh tiga. Aku tidak menulis detail tambahan. Aku hanya menulis
          angka.
        default: true

  - id: "scene_2"
    text: |
      Sore itu, Jaya mendekatiku di belakang gudang. Anak muda — mungkin
      lima belas tahun, mungkin enam belas. Matanya gelap, seperti air yang
      terlalu dalam untuk dilihat dasarnya.

      "Kak Rasmi," bisiknya. "Aku juga melihat. Dua hari lalu. Tangan
      laki-laki itu — dia memasukkan sesuatu ke dalam kaleng."

      Dia menelan ludah. "Kalau aku kehilangan pekerjaan ini, adik-adikku
      tidak makan."

  - id: "scene_3"
    text: |
      Aku tidak menjawab langsung. Aku melihat ke arah kantor mandor — pintu
      kayu yang selalu tertutup, cat yang mengelupas di sudutnya. Di balik
      pintu itu ada buku besar milik mandor. Buku yang diakui kantor. Buku
      yang dihitung oleh orang-orang yang dibayar untuk menghitung.

      Buku kecilku tidak dihitung oleh siapa pun kecuali aku.

      Jaya menunggu. Matanya memohon.

    choice:
      prompt: "Apa yang kamu lakukan?"
      options:
        - id: "bicara"
          label: "Duduk di sebelah Jaya. Tanya lebih banyak."
          next: "scene_4"
          set_flags:
            - "berbicara_dengan_jaya: true"
        - id: "diam_saja"
          label: "Diam. Jangan bicara. Jangan terlibat."
          next: "scene_4"
          set_flags:
            - "berbicara_dengan_jaya: false"

  - id: "scene_4"
    text: |
      Aku tidak menjawab. Jaya menatapku lama — lama sekali, sampai aku
      merasa matanya menembus kulit dan menemukan sesuatu yang aku sembunyikan
      di sana.

      Lalu dia mengangguk. Perlahan. Seperti orang yang baru belajar bahwa
      dunia ini tidak selalu bisa dibaca dengan jelas.

      Dia berdiri dan pergi. Aku mendengar langkahnya — ringan, cepat, seperti
      orang yang lari dari sesuatu yang belum tentu ada.

    text_variants:
      - condition: "berbicara_dengan_jaya == true"
        text: |
          Aku duduk di sebelah Jaya. Batu bata di bawahku masih panas dari
          sinar matahari siang.

          "Ceritakan," kataku.

          Jaya menelan ludah lagi. "Dua hari lalu, sekitar jam tiga sore. Aku
          sedang merapikan kaleng di baris ketiga. Laki-laki itu datang — pakaian
          rapi, kulit pucat. Dia tidak bicara. Dia hanya membuka tutup salah satu
          kaleng, memasukkan sesuatu — kertas, mungkin — lalu menutupnya lagi."

          "Kamu yakin?"

          "Aku yakin." Matanya menatapku. "Tapi siapa yang akan percaya pada
          anak muda seperti aku?"

          Aku merasakan sesuatu yang berat di dadaku. Bukan takut. Bukan simpati.
          Pengenalan. Aku juga pernah merasa seperti itu — seperti orang yang
          melihat sesuatu tapi tidak punya kata untuk menyebutnya.
      - condition: "berbicara_dengan_jaya == false"
        text: |
          Aku tidak menjawab. Jaya menatapku lama — lama sekali, sampai aku
          merasa matanya menembus kulit dan menemukan sesuatu yang aku sembunyikan
