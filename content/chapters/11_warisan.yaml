id: "11_warisan"
title: "THE LAST COUNT"
location: "Dermaga Sunda Kelapa, Batavia"
date: "20 Maret 1899"
time: "17.00"

scenes:
  - id: "scene_1"
    text: |
      Lima hari berlalu. Udara sudah berubah — musim sudah berganti, dan
      baunya juga. Bau asin yang dulu kental sekarang sudah hilang, digantikan
      oleh bau tanah yang sudah kering.

      Aku berdiri di ujung dermaga. Air laut menghantam batu — suara yang
      sama seperti sebelas bulan lalu. Suara yang akan sama sebelas bulan
      dari sekarang.

      Tapi aku tidak sama. Aku berubah — perlahan, seperti kertas yang
      menyerap tinta. Perubahan yang tidak terlihat dari luar, tapi terasa
      di dalam.

    text_variants:
      - condition: "kebenaran_terungkap == true"
        text: |
          Lima hari berlalu. Udara sudah berubah — musim sudah berganti, dan
          baunya juga. Bau asin yang dulu kental sekarang sudah hilang, digantikan
          oleh bau tanah yang sudah kering.

          Aku berdiri di ujung dermaga. Air laut menghantam batu — suara yang
          sama seperti sebelas bulan lalu. Suara yang akan sama sebelas bulan
          dari sekarang.

          Tapi aku tidak sama. Aku berubah — perlahan, seperti kertas yang
          menyerap tinta. Perubahan yang tidak terlihat dari luar, tapi terasa
          di dalam.

          Dan sekarang, orang lain juga tahu. Kebenaran yang sudah lama
          tersembunyi sekarang sudah terungkap. Angka-angkaku sudah memiliki
          bukti. Bukan hanya catatan. Bukan hanya ingatan. Tapi kertas
          yang bisa dibaca oleh siapa pun.
      - condition: "kebenaran_terungkap == false"
        text: |
          Lima hari berlalu. Udara sudah berubah — musim sudah berganti, dan
          baunya juga. Bau asin yang dulu kental sekarang sudah hilang, digantikan
          oleh bau tanah yang sudah kering.

          Aku berdiri di ujung dermaga. Air laut menghantam batu — suara yang
          sama seperti sebelas bulan lalu. Suara yang akan sama sebelas bulan
          dari sekarang.

          Tapi aku tidak sama. Aku berubah — perlahan, seperti kertas yang
          menyerap tinta. Perubahan yang tidak terlihat dari luar, tapi terasa
          di dalam.

          Dan sekarang, aku tahu bahwa kebenaran tidak akan pernah terungkap.
          Bukan karena tidak ada bukti. Tapi karena bukti tidak cukup untuk
          mengubah dunia.
        default: true

  - id: "scene_2"
    text: |
      Buku kecilku di pangkuan. Halaman-halamannya sudah lebih tebal dari
      sebelumnya — beberapa basah kena hujan, beberapa kering dan rapuh
      seperti kulit bawang. Tapi setiap halaman punya tulisan. Setiap baris
      punya angka.

      Aku membuka halaman terakhir. Jari-jariku bergetar di atas kertas.
      Aku sudah menulis nama Mandor Hanafiah — nama yang tidak pernah aku
      sebutkan kepada siapa pun. Nama yang sekarang tertulis di sini,
      di samping angka-angka yang tidak pernah salah.

      Tapi apakah aku berani meninggalkan nama itu? Apakah aku berani
      membuat bukti ini menjadi bukan hanya tentang angka — tapi tentang
      seseorang yang bertanggung jawab?

    choice:
      prompt: "Nama Mandor tertulis di halaman terakhir. Apa yang kamu lakukan?"
      options:
        - id: "simpan"
          label: "Biarkan nama itu tertulis — biar seseorang membaca kebenaran"
          next: "scene_3"
          set_flags:
            - "warisan_positif: true"
            - "cerita_tertulis: true"
        - id: "hapus"
          label: "Hapus nama itu — biar hanya angka yang tersisa"
          next: "scene_3"
          set_flags:
            - "warisan_positif: false"
            - "cerita_tertulis: false"

  - id: "scene_3"
    text: |
      Aku melakukan sesuatu dengan halaman terakhir buku kecilku. Sesuatu
      yang kecil, yang tidak akan dilihat oleh siapa pun kecuali aku — atau
      mungkin tidak akan dilihat oleh siapa pun sama sekali, termasuk aku,
      di masa depan.

      Tapi angka-angka itu sudah ada di kepalaku. Tiga puluh dua masuk.
      Tiga puluh tiga tercatat. Tiga puluh empat masuk. Tiga puluh lima
      tercatat. Aku tidak membutuhkan kertas untuk mengingat itu.

      Aku membutuhkan kertas untuk membuktikan bahwa aku pernah menghitung.
      Dan sekarang, aku juga membutuhkan kertas untuk membuktikan bahwa
      ada orang yang seharusnya bertanggung jawab.

    text_variants:
      - condition: "warisan_positif == true"
        text: |
          Aku membiarkan nama itu tertulis. Mandor Hanafiah. Empat suku
          kata yang sekarang menjadi bagian dari catatanku — bukan hanya
          angka, tapi nama.

          Aku menyimpan buku kecilku di tempat yang hanya aku yang tahu.
          Di balik batu bata yang longgar. Di samping kertas-kertas yang
          Jaya temukan.

          Sekarang aku punya dua bukti. Dua sumber. Dua catatan yang tidak
          cocok dengan catatan mandor. Dan salah satunya punya nama.

          Dan suatu hari, seseorang akan menemukannya. Mungkin besok. Mungkin
          sebelas tahun dari sekarang. Mungkin tidak pernah.

          Tapi buku ini ada. Dan angka-angkanya benar. Selalu benar.
          Dan nama di halaman terakhir — itu yang tidak bisa diambil dari aku.
      - condition: "warisan_positif == false"
        text: |
          Aku menghapus nama Mandor Hanafiah dari halaman terakhir. Tinta
          basah menyatu dengan kertas — menjadi noda yang tidak terbaca.

          Sekarang hanya ada angka. Tiga puluh dua. Tiga puluh tiga. Tiga
          puluh empat. Tanpa nama. Tanpa tuduhan. Hanya hitungan.

          Aku menyimpan buku kecilku di tempat yang hanya aku yang tahu.
          Di balik batu bata yang longgar.

          Mungkin ini lebih aman. Mungkin ini lebih bijak. Tapi setiap
          malam, aku bertanya-tanya: apa yang terjadi jika aku berani
          menulis nama itu?
        default: true

  - id: "scene_4"
    text: |
      Aku berdiri di ujung dermaga. Angin laut meniup wajahku — asin, basah,
      dingin. Sama seperti malam pertama aku bekerja di gudang ini.

      Sebelas bulan. Seribu seratus malam. Angka-angka yang tidak pernah
      berhenti. Angka-angka yang selalu benar — bahkan ketika orang yang
      menulisnya salah.

      Aku menutup mata. Mendengar suara laut. Suara yang sama seperti besok.
      Suara yang sama seperti kemarin. Suara yang tidak akan pernah berhenti
      meskipun aku berhenti mendengar.

  - id: "scene_5"
    text: |
      Aku membuka mata. Dermaga masih di sana. Laut masih di sana. Dan aku
      masih di sini — berdiri di atas kayu yang berderit, di bawah langit
      yang gelap, di depan air yang tidak pernah bisa dihitung.

      Besok, aku akan menghitung lagi. Seperti biasa. Seperti tidak terjadi
      apa-apa.

      Tapi malam ini, aku tahu satu hal: angka tidak akan berhenti karena
      aku berhenti mencatat. Tapi cara aku mencatat — itu yang tidak bisa
      diambil dari aku.

      Dan mungkin — mungkin — itu sudah cukup.

    text_variants:
      - condition: "cerita_tertulis == true"
