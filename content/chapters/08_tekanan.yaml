          "Mulai hari ini," katanya, "setiap kaleng harus dihitung dua kali.
          Sekali oleh mandor. Sekali oleh kantor kabupaten."

          Mandor menatapku lebih lama dari biasanya. Seperti dia tahu
          sesuatu. Matanya tajam — seperti pisau yang sudah terlalu sering
          diasah.

          Aku merasakan sesuatu bergerak di dadaku. Bukan takut. Bukan lega.
          Sesuatu di antara keduanya — seperti pertanyaan yang sudah terjawab
          tapi belum terucap.
      - condition: "respon_ancaman == hindari"
