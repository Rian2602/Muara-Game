          Aku tidak bisa mendengar kata-katanya. Tapi aku bisa mendengar
          nadanya — nadanya yang tajam, menghitung.

          Tidak ada yang bisa kuharapkan. Hanya diriku sendiri. Dan sekarang,
          aku harus memutuskan: sekarang atau tidak sama sekali.
        default: true

  - id: "scene_3"
    text: |
      Jaya menatapku. Matanya memohon — bukan simpati, tapi keberanian.
      Keberanian yang tidak bisa aku berikan.

      "Aku punya ide," katanya pelan. "Kalau kita bisa membuktikan bahwa
      kaleng yang dihitung mandor berbeda dari kaleng yang masuk... kalau
      kita punya bukti..."

      Dia berhenti. Matanya bergerak ke arah kantornya mandor.

      "Tapi kita butuh sesuatu yang lebih dari angka. Kita butuh saksi.
      Atau bukti fisik."

    choice:
      prompt: "Apa yang kamu lakukan?"
      options:
        - id: "percaya_jaya"
          label: "Percaya Jaya. Rencanakan bersama."
          next: "scene_4"
          set_flags:
            - "percaya_jaya: true"
          hooks:
            - "increment(tekanan_meningkat, 3)"
        - id: "tolak_jaya"
          label: "Tolak. Terlalu berbahaya. Jangan libatkan dia."
          next: "scene_4"
          set_flags:
            - "percaya_jaya: false"
          hooks:
            - "increment(tekanan_meningkat, 1)"

  - id: "scene_4"
    text: |
      Aku memberikan jawabanku. Jawaban yang kecil — mungkin terlalu
      kecil untuk mengubah sesuatu. Tapi jawaban kecil bisa menjadi
      awal dari sesuatu yang lebih besar.

      Jaya mengangguk. Lalu dia berdiri dan pergi. Langkahnya ringan
      — lebih ringan dari sebelumnya. Seperti orang yang baru menemukan
      sesuatu yang sudah lama hilang.

      Aku mendengar langkahnya menjauh. Dan aku tahu: mulai hari ini,
      aku tidak sendirian dalam pertanyaan ini.

    text_variants:
      - condition: "percaya_jaya == true"
        text: |
          "Baik," kataku. "Kita cari bukti."

          Jaya mengangguk. Matanya berubah — dari ketakutan menjadi tekad.
          Tekad yang rapuh, seperti kaca yang sudah retak tapi belum pecah.

          "Besok malam," bisiknya. "Setelah semua orang pergi. Aku akan
          menunjukkan sesuatu."

          Dia berdiri dan pergi. Langkahnya ringan — lebih ringan dari
          sebelumnya. Seperti orang yang baru menemukan sesuatu yang sudah
          lama hilang.

          Aku mendengar langkahnya menjauh. Dan aku tahu: mulai hari ini,
          aku punya sekutu.
      - condition: "percaya_jaya == false"
        text: |
          "Tidak," kataku. "Terlalu berbahaya."

          Jaya menatapku lama. Matanya berubah — dari ketakutan menjadi
          kekecewaan. Kekecewaan yang dalam, seperti air yang tidak bisa
          ditahan.

          "Baik," katanya pelan. "Aku mengerti."

          Dia berdiri dan pergi. Langkahnya berat — lebih berat dari
          sebelumnya. Seperti orang yang baru kehilangan sesuatu yang sudah
          lama dijaga.

          Aku mendengar langkahnya menjauh. Dan aku tahu: mulai hari ini,
          aku sendirian dalam pertanyaan ini.
        default: true

  - id: "scene_5"
    text: |
      Malam hari. Aku duduk di depan rumah petakku. Lampu minyak menyala
      di samping. Buku kecilku di pangkuan.

      Aku menulis: "12 Maret 1899. Mandor tahu. Jaya melihat. Aku melihat.
      Selisih ada."

      Lalu aku berhenti. Jari-jariku di atas kertas.

      Aku punya dua pilihan. Pertama: tunggu Jaya, lihat apa yang dia
      temukan. Kedua: bertindak sendiri, sekarang, sebelum terlambat.

      Tapi ada pilihan ketiga yang tidak pernah aku pertimbangkan sebelumnya:
      berhenti. Berhenti mencatat. Berhenti melihat. Berhenti peduli.

      Mungkin itu yang paling aman. Mungkin itu yang paling bijak.

    choice:
      prompt: "Apa yang kamu lakukan?"
      options:
        - id: "tunggu"
          label: "Tunggu Jaya. Lihat apa yang dia temukan."
          next: "scene_5a"
          hooks:
            - "increment(tekanan_meningkat, 2)"
        - id: "bertindak"
          label: "Bertindak sendiri. Sekarang. Sebelum terlambat."
          next: "scene_5a"
          hooks:
            - "increment(tekanan_meningkat, 4)"
        - id: "berhenti"
          label: "Berhenti. Berhenti mencatat. Berhenti peduli."
          next: "scene_5b"

  - id: "scene_5a"
    text: |
      Aku memutuskan sesuatu malam ini. Keputusan yang mungkin terlalu
      besar untuk satu orang. Tapi keputusan besar bisa menjadi awal
      dari sesuatu yang lebih kecil — seperti kebenaran.

      Besok, aku akan bangun seperti biasa. Tapi tidak akan seperti
      biasa. Karena sekarang, aku tahu lebih banyak dari yang seharusnya
      aku tahu.

      Dan pengetahuan itu — seperti angka yang tidak pernah salah —
      tidak bisa diambil dari aku.

    next_chapter: "09_pilihan_sulit"

  - id: "scene_5b"
    text: |
      Aku meletakkan buku kecilku di lantai. Halaman-halamannya masih
      terbuka — angka-angka masih tertulis di sana. Tapi aku tidak mau
      melihatnya lagi.

      Aku berdiri. Berjalan ke jendela. Menatap kegelapan di luar.

      Mungkin ini yang paling aman. Berhenti mencatat. Berhenti peduli.
      Berpura-pura tidak terjadi apa-apa.

      Tapi angka-angka itu tidak akan berhenti karena aku berhenti
      mencatat. Mereka akan tetap ada di kepalaku — menghantuiku
      setiap malam. Setiap kali aku menutup mata.

      Dan besok, aku akan bangun seperti biasa. Menghitung kaleng
      seperti biasa. Tapi tanpa menulis. Tanpa bukti. Hanya angka.

      Mungkin itu sudah cukup. Mungkin tidak.

    next_chapter: "09_pilihan_sulit"
