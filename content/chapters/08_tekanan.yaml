id: "08_tekanan"
title: "CLOSED DOORS"
location: "Pergudangan Pelabuhan Sunda Kelapa, Batavia"
date: "12 Maret 1899"
time: "06.00"

scenes:
  - id: "scene_1"
    text: |
      Pagi ini, mandor memanggil semua pekerja. Suaranya tajam — seperti
      kayu yang dipukul terlalu keras. Kami berdiri di barisan, tangan
      di samping tubuh, mata menunduk.

      "Mulai hari ini," katanya, "setiap kaleng harus dihitung dua kali.
      Sekali oleh mandor. Sekali oleh kantor kabupaten."

      Aku merasakan sesuatu bergerak di dadaku. Bukan takut. Bukan lega.
      Sesuatu di antara keduanya — seperti pertanyaan yang belum terjawab.

    text_variants:
      - condition: "respon_ancaman == hadapi"
        text: |
          Pagi ini, mandor memanggil semua pekerja. Suaranya tajam — seperti
