id: "05_perhitungan"
title: "WHAT REMAINS"
location: "Pergudangan Pelabuhan Sunda Kelapa, Batavia"
date: "10 Maret 1899"
time: "17.00"

scenes:
  - id: "scene_1"
    text: |
      Sepekan berlalu. Udara sudah berubah — musim hampir berganti, dan
      baunya juga. Bau asin yang dulu kental sekarang lebih tipis, digantikan
      oleh bau tanah yang mulai mengering.

      Aku duduk di depan rumah petakku. Pelabuhan masih terlihat dari sini —
      dermaga kayu yang memanjang seperti tulang rusuk raksasa yang tersangkut
      di tepi laut. Di sana, orang-orang masih menghitung kaleng. Masih
      menulis angka. Masih percaya bahwa angka bisa menahan sesuatu dari
      kehilangan.

  - id: "scene_2"
    text: |
      Buku kecilku di pangkuan. Halaman-halamannya sudah lebih tebal dari
      sebelumnya — beberapa basah kena hujan, beberapa kering dan rapuh
      seperti kulit bawang. Tapi setiap halaman punya tulisan. Setiap baris
      punya angka.

      Aku membuka halaman terakhir. Aku menulis satu entri lagi: tanggal,
      jumlah, dan satu kalimat yang bukan angka. Kalimat itu tentang nama
      seseorang yang tidak pernah aku sebutkan kepada siapa pun.

      Nama ini untuk buku ini. Hanya untuk buku ini.

    text_variants:
      - condition: "bukti_kuat == true"
        text: |
          Buku kecilku di pangkuan. Halaman-halamannya sudah lebih tebal dari
          sebelumnya — beberapa basah kena hujan, beberapa kering dan rapuh
          seperti kulit bawang. Tapi setiap halaman punya tulisan. Setiap baris
          punya angka.

          Di sebelah buku kecilku, ada kertas Jaya — lipatan kecil, tulisan
          bergetar, tapi jelas. Dua bukti. Dua orang. Dua catatan yang
          tidak cocok dengan catatan Mandor.

          Aku membuka halaman terakhir. Aku menulis satu entri lagi: tanggal,
          jumlah, dan satu kalimat yang bukan angka. Kalimat itu tentang nama
          seseorang yang tidak pernah aku sebutkan kepada siapa pun.

          Nama ini untuk buku ini. Hanya untuk buku ini.
      - condition: "bukti_kuat == false"
        text: |
          Buku kecilku di pangkuan. Halaman-halamannya sudah lebih tebal dari
          sebelumnya — beberapa basah kena hujan, beberapa kering dan rapuh
          seperti kulit bawang. Tapi setiap halaman punya tulisan. Setiap baris
